<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BidIQ Pro</title>
    <script>
      // SPA fallback: stores the full path then redirects to / so React Router can handle it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?r=' +
        encodeURIComponent(l.pathname + l.search + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
