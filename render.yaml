# BidIQ Pro — Render Blueprint
# This file auto-creates all services when you connect this repo as a Blueprint.
# https://render.com/docs/blueprint-spec
#
# IMPORTANT: Do NOT put real secrets here.
# After Render creates the services, go to each service → Environment
# and manually add the secret values listed in DEPLOYMENT.md.

services:

  # ── Frontend — Static Site ───────────────────────────────────
  - type: web
    name: bidiq-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_APP_NAME
        value: BidIQ Pro
      # Set VITE_APP_URL and VITE_API_URL manually in Render dashboard
      # after you know the deployed URLs.
      - key: VITE_DEMO_MODE
        value: "true"           # Change to false for live launch
      # Add these in Render dashboard (safe to expose — publishable key only):
      # VITE_APP_URL
      # VITE_API_URL
      # VITE_STRIPE_PUBLISHABLE_KEY

