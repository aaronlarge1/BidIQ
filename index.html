<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/bidiq-pro-icon.png" />
    <meta name="theme-color" content="#1e3055" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BidIQ Pro" />

    <!-- SEO -->
    <title>BidIQ Pro — The AI Procurement Operating System for SMEs</title>
    <meta name="description" content="BidIQ Pro helps SMEs discover live government tenders, check eligibility, prepare compliance, write stronger bids with AI, and manage contracts from opportunity to renewal." />
    <meta name="keywords" content="public sector procurement, tender alerts, bid writing AI, government contracts SME, compliance vault, National Highways tenders" />

    <!-- Open Graph — used by WhatsApp, Facebook, LinkedIn, Telegram, iMessage, Slack -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BidIQ Pro" />
    <meta property="og:url" content="%VITE_APP_URL%/" />
    <meta property="og:title" content="BidIQ Pro — Win More Public-Sector Contracts" />
    <meta property="og:description" content="AI-powered tender discovery, compliance, bid writing and contract management for UK SMEs. Win bigger contracts without hiring a full bid team." />
    <meta property="og:image" content="%VITE_APP_URL%/brand/bidiq-social-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="BidIQ Pro — The AI Procurement Operating System for UK SMEs" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BidIQ Pro — Win More Public-Sector Contracts" />
    <meta name="twitter:description" content="AI-powered tender discovery, compliance, bid writing and contract management for UK SMEs." />
    <meta name="twitter:image" content="%VITE_APP_URL%/brand/bidiq-social-preview.png" />
    <meta name="twitter:image:alt" content="BidIQ Pro dashboard showing live tenders and compliance score" />

    <!-- Inter font via Bunny (GDPR-friendly) -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css?family=inter:300,400,500,600,700,800,900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- SPA routing: restore path stored by 404.html -->
    <script>
      (function () {
        var r = new URLSearchParams(window.location.search).get('r');
        if (r) {
          try {
            var decoded = decodeURIComponent(r);
            window.history.replaceState(null, '', decoded);
          } catch (e) {}
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
